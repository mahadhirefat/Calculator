<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f4f0;
      font-family: 'DM Mono', monospace;
    }

    .calc {
      width: 320px;
      background: #ffffff;
      border: 1px solid #e0ddd5;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    .display {
      padding: 1.5rem 1.5rem 1rem;
      background: #f5f4f0;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
    }

    .expr {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: #888780;
      min-height: 18px;
      text-align: right;
      letter-spacing: 0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result {
      font-family: 'DM Mono', monospace;
      font-size: 38px;
      font-weight: 500;
      color: #1a1a18;
      text-align: right;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result.error { color: #A32D2D; }

    .keys {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: #e0ddd5;
      border-top: 1px solid #e0ddd5;
    }

    .key {
      border: none;
      background: #ffffff;
      color: #1a1a18;
      font-family: 'DM Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      padding: 0;
      height: 68px;
      cursor: pointer;
      transition: background 0.08s, transform 0.07s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .key:hover { background: #f5f4f0; }
    .key:active { background: #eceae4; transform: scale(0.94); }

    .key.fn {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #5f5e5a;
      background: #f5f4f0;
    }
    .key.fn:hover { background: #eceae4; }

    .key.op {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: #185FA5;
    }

    .key.eq {
      background: #185FA5;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
    }
    .key.eq:hover { background: #1a6ab8; }
    .key.eq:active { background: #0C447C; }

    .key.zero { grid-column: span 2; }
  </style>
</head>
<body>

  <div class="calc" role="application" aria-label="Calculator">
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="keys" id="keys">
      <button class="key fn" data-action="ac">AC</button>
      <button class="key fn" data-action="sign">+/−</button>
      <button class="key fn" data-action="pct">%</button>
      <button class="key op" data-action="op" data-val="/">÷</button>

      <button class="key" data-action="num" data-val="7">7</button>
      <button class="key" data-action="num" data-val="8">8</button>
      <button class="key" data-action="num" data-val="9">9</button>
      <button class="key op" data-action="op" data-val="*">×</button>

      <button class="key" data-action="num" data-val="4">4</button>
      <button class="key" data-action="num" data-val="5">5</button>
      <button class="key" data-action="num" data-val="6">6</button>
      <button class="key op" data-action="op" data-val="-">−</button>

      <button class="key" data-action="num" data-val="1">1</button>
      <button class="key" data-action="num" data-val="2">2</button>
      <button class="key" data-action="num" data-val="3">3</button>
      <button class="key op" data-action="op" data-val="+">+</button>

      <button class="key zero" data-action="num" data-val="0">0</button>
      <button class="key" data-action="dot">.</button>
      <button class="key eq" data-action="eq">=</button>
    </div>
  </div>

  <script>
    const resultEl = document.getElementById('result');
    const exprEl = document.getElementById('expr');

    let cur = '0', prev = '', op = null, newNum = true;

    function fmt(n) {
      if (n === 'Error') return n;
      let num = parseFloat(n);
      if (isNaN(num)) return n;
      let s = parseFloat(num.toPrecision(12)).toString();
      if (s.length > 12) s = num.toExponential(5);
      return s;
    }

    function setDisplay(val, isErr) {
      resultEl.textContent = val;
      resultEl.className = 'result' + (isErr ? ' error' : '');
    }

    function press(action, val) {
      if (action === 'ac') {
        cur = '0'; prev = ''; op = null; newNum = true;
        exprEl.textContent = '';
        setDisplay('0');
      } else if (action === 'num') {
        if (newNum) { cur = val; newNum = false; }
        else cur = (cur === '0') ? val : cur + val;
        setDisplay(fmt(cur));
      } else if (action === 'dot') {
        if (newNum) { cur = '0.'; newNum = false; }
        else if (!cur.includes('.')) cur += '.';
        setDisplay(cur);
      } else if (action === 'sign') {
        if (cur !== '0') { cur = cur.startsWith('-') ? cur.slice(1) : '-' + cur; setDisplay(fmt(cur)); }
      } else if (action === 'pct') {
        cur = String(parseFloat(cur) / 100);
        setDisplay(fmt(cur));
      } else if (action === 'op') {
        if (op && !newNum) {
          let a = parseFloat(prev), b = parseFloat(cur), r;
          if (op === '/' && b === 0) { setDisplay('Error', true); exprEl.textContent = ''; op = null; newNum = true; return; }
          if (op === '+') r = a + b;
          else if (op === '-') r = a - b;
          else if (op === '*') r = a * b;
          else if (op === '/') r = a / b;
          cur = String(parseFloat(r.toPrecision(12)));
        }
        prev = cur; op = val; newNum = true;
        const opSym = {'+':'+', '-':'−', '*':'×', '/':'÷'}[val];
        exprEl.textContent = fmt(prev) + ' ' + opSym;
        setDisplay(fmt(cur));
      } else if (action === 'eq') {
        if (!op) return;
        let a = parseFloat(prev), b = parseFloat(cur), r;
        const opSym = {'+':'+', '-':'−', '*':'×', '/':'÷'}[op];
        exprEl.textContent = fmt(prev) + ' ' + opSym + ' ' + fmt(cur) + ' =';
        if (op === '/' && b === 0) { setDisplay('Error', true); op = null; newNum = true; return; }
        if (op === '+') r = a + b;
        else if (op === '-') r = a - b;
        else if (op === '*') r = a * b;
        else if (op === '/') r = a / b;
        cur = String(parseFloat(r.toPrecision(12)));
        op = null; newNum = true;
        setDisplay(fmt(cur));
      }
    }

    document.getElementById('keys').addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      press(btn.dataset.action, btn.dataset.val);
    });

    document.addEventListener('keydown', e => {
      if ('0123456789'.includes(e.key)) press('num', e.key);
      else if ('+-*/'.includes(e.key)) press('op', e.key);
      else if (e.key === '.') press('dot');
      else if (e.key === 'Enter' || e.key === '=') press('eq');
      else if (e.key === 'Backspace' || e.key === 'Escape') press('ac');
      else if (e.key === '%') press('pct');
    });
  </script>

</body>
</html>
